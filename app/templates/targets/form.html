{% extends "base.html" %}

{% block title %}{{ 'Edit' if target else 'Set' }} Monthly Target{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-edit text-primary me-2"></i>{{ 'Modify' if target else 'Define' }} Monthly Target</h2>
            <a href="{{ url_for('targets.index') }}" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-arrow-left"></i> Back to List
            </a>
        </div>

        <div class="card shadow border-0">
            <div class="card-header bg-gradient-primary text-white py-3">
                <h5 class="card-title mb-0">Monthly Target Configuration</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <label for="month" class="form-label fw-bold">Target Month</label>
                            <select name="month" id="month" class="form-select" required>
                                {% set months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'] %}
                                {% for m in range(1, 13) %}
                                <option value="{{ m }}" {{ 'selected' if (target and target.month == m) or (not target and now.month == m) }}>
                                    {{ months[m-1] }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-6">
                            <label for="year" class="form-label fw-bold">Target Year</label>
                            <select name="year" id="year" class="form-select" required>
                                {% set current_year = now.year %}
                                {% for y in range(current_year - 2, current_year + 5) %}
                                <option value="{{ y }}" {{ 'selected' if (target and target.year == y) or (not target and current_year == y) }}>
                                    {{ y }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <hr>

                    <div class="mb-3">
                        <label for="target_production_qty" class="form-label fw-bold">Target Production Qty (Units)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-industry"></i></span>
                            <input type="number" step="0.01" name="target_production_qty" id="target_production_qty" 
                                   class="form-control" placeholder="Total units to produce"
                                   value="{{ target.target_production_qty if target else 0 }}" required>
                        </div>
                        <div class="form-text small">Amount of finished goods you aim to manufacture.</div>
                    </div>

                    <div class="mb-3">
                        <label for="target_production_cost" class="form-label fw-bold">Target Production Cost (Budget)</label>
                        <div class="input-group">
                            <span class="input-group-text">PKR</span>
                            <input type="number" step="0.01" name="target_production_cost" id="target_production_cost" 
                                   class="form-control" placeholder="Max production budget"
                                   value="{{ target.target_production_cost if target else 0 }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="target_sales_revenue" class="form-label fw-bold">Target Sales Revenue</label>
                        <div class="input-group">
                            <span class="input-group-text">PKR</span>
                            <input type="number" step="0.01" name="target_sales_revenue" id="target_sales_revenue" 
                                   class="form-control" placeholder="Revenue goal"
                                   value="{{ target.target_sales_revenue if target else 0 }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="target_sales_qty" class="form-label fw-bold">Target Sales Quantity (Units)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-boxes"></i></span>
                            <input type="number" step="0.01" name="target_sales_qty" id="target_sales_qty" 
                                   class="form-control" placeholder="Total units to sell"
                                   value="{{ target.target_sales_qty if target else 0 }}" required>
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary py-2 shadow-sm fw-bold">
                            <i class="fas fa-save me-1"></i> Save Target
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .bg-gradient-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
</style>
{% endblock %}
