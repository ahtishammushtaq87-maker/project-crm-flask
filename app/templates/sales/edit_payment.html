{% extends "base.html" %}
{% block title %}Edit Payment{% endblock %}
{% block content %}
<div class="modal-dialog modal-lg">
    <div class="modal-content">
        <form method="POST" enctype="multipart/form-data">
            <div class="modal-header">
                <h5 class="modal-title">Edit Payment #{{ payment.payment_number }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Amount (PKR)</label>
                        <input type="number" name="amount" value="{{ '%.2f'|format(payment.amount) }}" step="0.01" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Payment Date</label>
                        <input type="date" name="payment_date" value="{{ payment.date.strftime('%Y-%m-%d') }}" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Method</label>
                        <select name="payment_method" class="form-select">
                            <option value="Cash" {{ 'selected' if payment.method == 'Cash' }}>Cash</option>
                            {% for method in payment_methods %}
                            <option value="{{ method.name }}" {{ 'selected' if payment.method == method.name }}>{{ method.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Receipt Image (optional - replaces old)</label>
                        <input type="file" name="payment_image" class="form-control" accept="image/*,.pdf">
                        {% if payment.image_path %}
                        <div class="mt-2">
                            <img src="{{ url_for('sales.payment_image', payment_id=payment.id) }}" style="max-height:100px;" class="img-thumbnail">
                            <small class="text-muted d-block">Current image (will be replaced if new uploaded)</small>
                        </div>
                        {% endif %}
                    </div>
                    <div class="col-12">
                        <label class="form-label">Notes</label>
                        <textarea name="payment_notes" class="form-control">{{ payment.notes or '' }}</textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-primary">Update Payment</button>
            </div>
        </form>
    </div>
</div>

<script>
document.querySelector('input[type=file]').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            // Preview logic if needed
        };
        reader.readAsDataURL(file);
    }
});
</script>
