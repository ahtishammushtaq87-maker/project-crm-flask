{% extends "base.html" %}
{% block title %}Edit Payment{% endblock %}
{% block content %}
<div class="modal-dialog modal-lg">
    <div class="modal-content">
        <form method="POST" action="{{ url_for('purchase.edit_bill_payment', id=bill.id, pay_id=payment.id) }}" enctype="multipart/form-data">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title">Edit Payment #{{ payment.id }}</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Amount (PKR)</label>
                        <input type="number" name="amount" value="{{ '%.2f'|format(payment.amount) }}" step="0.01" class="form-control" required min="0">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Date</label>
                        <input type="date" name="payment_date" value="{{ payment.date.strftime('%Y-%m-%d') }}" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Method</label>
                        <select name="payment_method" class="form-select">
                            <option value="Cash" {{ 'selected' if payment.payment_method == 'Cash' }}>Cash</option>
                            <option value="Bank Transfer" {{ 'selected' if payment.payment_method == 'Bank Transfer' }}>Bank Transfer</option>
                            <option value="Cheque" {{ 'selected' if payment.payment_method == 'Cheque' }}>Cheque</option>
                            <option value="Online" {{ 'selected' if payment.payment_method == 'Online' }}>Online</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">New Receipt (optional)</label>
                        <input type="file" name="payment_image" class="form-control" accept="image/*,.pdf">
                        {% if payment.image_path %}
                        <div class="mt-2">
                            <img src="{{ url_for('purchase.bill_payment_image', pay_id=payment.id) }}" style="max-height:100px;" class="img-thumbnail">
                            <small class="text-muted d-block">Current image (will be replaced if new uploaded)</small>
                        </div>
                        {% endif %}
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Notes</label>
                        <textarea name="payment_notes" class="form-control" rows="2">{{ payment.notes or '' }}</textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-primary">Update Payment</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
