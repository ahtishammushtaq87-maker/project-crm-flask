<!-- Universal Advanced Filter Modal — included in base.html for global availability -->
<div class="modal fade" id="universalFilterModal" tabindex="-1" aria-labelledby="universalFilterModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable modal-fullscreen-sm-down">
    <div class="modal-content">

      <!-- Header -->
      <div class="modal-header">
        <h5 class="modal-title" id="universalFilterModalLabel">
          <i class="fas fa-filter me-2"></i>Advanced Filter
        </h5>
        <div class="d-flex align-items-center gap-2">
          <select id="ufm-saved-filters" class="form-select form-select-sm" style="min-width: 140px; max-width: 200px;">
            <option value="">-- Saved Filters --</option>
          </select>
          <button type="button" id="ufm-btn-delete-saved" class="btn btn-sm btn-outline-danger d-none" title="Delete saved filter">
            <i class="fas fa-trash"></i>
          </button>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
      </div>

      <!-- Body -->
      <div class="modal-body">

        <!-- Module context badge -->
        <div class="mb-3">
          <span class="badge bg-secondary" id="ufm-module-badge">module: <span id="ufm-module-label">--</span></span>
        </div>

        <!-- Condition toggle -->
        <div class="mb-3">
          <label class="form-label fw-bold">Match Condition</label>
          <div class="btn-group" role="group" aria-label="Filter condition">
            <input type="radio" class="btn-check" name="ufm-condition" id="ufm-condition-and" value="AND" checked>
            <label class="btn btn-outline-primary" for="ufm-condition-and"><i class="fas fa-link me-1"></i>AND</label>

            <input type="radio" class="btn-check" name="ufm-condition" id="ufm-condition-or" value="OR">
            <label class="btn btn-outline-primary" for="ufm-condition-or"><i class="fas fa-code-branch me-1"></i>OR</label>
          </div>
        </div>

        <!-- Rules container -->
        <div id="ufm-rules-container">
          <!-- Dynamic rule rows injected here by JS -->
        </div>

        <!-- Add Rule button -->
        <div class="mt-3">
          <button type="button" id="ufm-btn-add-rule" class="btn btn-outline-success btn-sm">
            <i class="fas fa-plus me-1"></i>Add Rule
          </button>
        </div>

        <!-- Sorting Section -->
        <hr class="mt-4">
        <div class="mb-3">
          <label class="form-label fw-bold text-muted small text-uppercase"><i class="fas fa-sort me-1"></i>Order Results</label>
          <div class="row g-2 align-items-center">
             <div class="col-sm-8">
                <select id="ufm-sort-field" class="form-select form-select-sm">
                   <option value="">-- Default Order --</option>
                </select>
             </div>
             <div class="col-sm-4">
                <select id="ufm-sort-order" class="form-select form-select-sm">
                   <option value="asc">Ascending (1 → 9, A → Z)</option>
                   <option value="desc">Descending (9 → 1, Z → A)</option>
                </select>
             </div>
          </div>
        </div>

        <!-- Save Filter Panel -->
        <div id="ufm-save-panel" class="mt-4 p-3 border rounded bg-light d-none">
          <label class="form-label fw-bold small text-uppercase mb-2"><i class="fas fa-save me-1"></i>Save This Filter</label>
          <div class="input-group input-group-sm">
            <input type="text" id="ufm-save-name" class="form-control" placeholder="Enter filter name (e.g. High Priority Expenses)">
            <button type="button" id="ufm-btn-confirm-save" class="btn btn-primary">Save</button>
            <button type="button" id="ufm-btn-cancel-save" class="btn btn-outline-secondary">Cancel</button>
          </div>
          <div class="form-text mt-2 small">Saved filters will appear in the dropdown menu at the top.</div>
        </div>

        <!-- Error / Info messages -->
        <div id="ufm-message" class="alert alert-sm mt-3 d-none"></div>

      </div>

      <!-- Footer -->
      <div class="modal-footer">
        <button type="button" id="ufm-btn-clear" class="btn btn-outline-secondary">
          <i class="fas fa-eraser me-1"></i>Clear
        </button>
        <button type="button" id="ufm-btn-save-toggle" class="btn btn-outline-primary">
          <i class="fas fa-save me-1"></i>Save Filter
        </button>
        <button type="button" id="ufm-btn-apply" class="btn btn-primary">
          <i class="fas fa-check me-1"></i>Apply Filter
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Universal Filter Button (floating, shown on pages that opt-in) -->
<div id="universal-filter-trigger-wrapper" class="d-none">
  <button type="button" id="universal-filter-trigger-btn" class="btn btn-primary btn-sm shadow"
          data-bs-toggle="modal" data-bs-target="#universalFilterModal">
    <i class="fas fa-filter me-1"></i>Advanced Filter
  </button>
</div>

</style>
