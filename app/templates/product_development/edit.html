{% extends "base.html" %}

{% block title %}Edit PD Project{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-edit me-2"></i>Edit Project: {{ project.pdv_code }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Product Name <span class="text-danger">*</span></label>
                            <input type="text" name="product_name" class="form-control" value="{{ project.product_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Link to SKU</label>
                            <select name="sku_id" class="form-select">
                                <option value="">-- Select Product --</option>
                                {% for p in products %}
                                <option value="{{ p.id }}" {{ 'selected' if project.sku_id == p.id else '' }}>{{ p.name }} ({{ p.sku }})</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Start Date</label>
                            <input type="date" name="start_date" class="form-control" value="{{ project.start_date.strftime('%Y-%m-%d') if project.start_date else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Promise Date</label>
                            <input type="date" name="promise_date" class="form-control" value="{{ project.promise_date.strftime('%Y-%m-%d') if project.promise_date else '' }}">
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Budget (PKR)</label>
                            <input type="number" name="budget" class="form-control" step="0.01" value="{{ project.budget }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select">
                                <option value="Draft" {{ 'selected' if project.status == 'Draft' else '' }}>Draft</option>
                                <option value="Active" {{ 'selected' if project.status == 'Active' else '' }}>Active</option>
                                <option value="On Hold" {{ 'selected' if project.status == 'On Hold' else '' }}>On Hold</option>
                                <option value="Completed" {{ 'selected' if project.status == 'Completed' else '' }}>Completed</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3">{{ project.description or '' }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('product_development.view', project_id=project.id) }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i> Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
