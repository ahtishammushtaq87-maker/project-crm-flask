{% extends "base.html" %}

{% block title %}Create PD Project{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-plus me-2"></i>New Product Development Project</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Product Name <span class="text-danger">*</span></label>
                            <input type="text" name="product_name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Link to SKU (Optional)</label>
                            <select name="sku_id" class="form-select">
                                <option value="">-- Select Product --</option>
                                {% for p in products %}
                                <option value="{{ p.id }}">{{ p.name }} ({{ p.sku }})</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Start Date</label>
                            <input type="date" name="start_date" class="form-control" value="{{ today }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Promise Date</label>
                            <input type="date" name="promise_date" class="form-control">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Budget (PKR)</label>
                        <input type="number" name="budget" class="form-control" step="0.01" placeholder="0.00">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('product_development.index') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i> Create Project
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
