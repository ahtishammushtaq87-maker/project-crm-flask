{% extends "base.html" %}

{% block title %}Edit Category{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Edit Category</h1>
        <a href="{{ url_for('categories.categories') }}" class="btn btn-sm btn-secondary shadow-sm">
            <i class="fas fa-arrow-left fa-sm text-white-50"></i> Back to Categories
        </a>
    </div>

    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Category Information</h6>
        </div>
        <div class="card-body">
                        {% if current_user.has_permission('categories', 'edit') %}
<form method="POST" action="{{ url_for('categories.edit_category', id=category.id) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                
                <div class="mb-3">
                    <label for="name" class="form-label">Category Name *</label>
                    <input type="text" class="form-control" name="name" placeholder="Enter category name" value="{{ category.name }}" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" name="description" rows="3" placeholder="Category description...">{{ category.description or '' }}</textarea>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i> Update Category
                    </button>
                    <a href="{{ url_for('categories.categories') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
{% endif %}            
        </div>
    </div>
</div>
{% endblock %}
