{% extends "base.html" %}

{% block title %}Add Product{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Add New Product</h1>
        <a href="{{ url_for('inventory.products') }}" class="btn btn-sm btn-secondary shadow-sm">
            <i class="fas fa-arrow-left fa-sm text-white-50"></i> Back to Products
        </a>
    </div>

    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Product Information</h6>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('inventory.add_product') }}" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Product Name *</label>
                        <input type="text" class="form-control" name="name" placeholder="Enter product name" required>
                    </div>
                    <div class="col-md-6">
                        <label for="sku" class="form-label">SKU / Item Code *</label>
                        <input type="text" class="form-control" name="sku" placeholder="e.g. PRD-001" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="category_id" class="form-label">Category</label>
                        <div class="input-group">
                            <select name="category_id" id="category_id" class="form-control">
                                <option value="0">No Category</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                            <a href="{{ url_for('categories.create_category') }}" class="btn btn-success" target="_blank" title="Create New Category">
                                <i class="fas fa-plus"></i>
                            </a>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="quantity" class="form-label">Initial Quantity</label>
                        <input type="number" class="form-control" name="quantity" step="0.01" value="0">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-12 mb-3">
                        <div class="form-check form-switch px-4 py-2 border rounded bg-light">
                            <input type="checkbox" class="form-check-input ms-0 me-3" name="is_manufactured" id="is_manufactured" value="1">
                            <label class="form-check-label fw-bold" for="is_manufactured">This is a Finished Good / Produced Item <br><small class="text-danger fw-normal">(Do NOT check this for raw materials! Cost is auto-calculated via BOMs)</small></label>
                        </div>
                    </div>
                </div>

                <div class="row mb-3" id="price_row">
                    <div class="col-md-4" id="cost_price_container">
                        <label for="cost_price" class="form-label">Cost Price</label>
                        <div class="input-group">
                            <span class="input-group-text">Rs</span>
                            <input type="number" class="form-control" name="cost_price" step="0.01" id="cost_price">
                        </div>
                    </div>
                    <div class="col-md-4" id="finished_good_price_container" style="display: none;">
                        <label for="finished_good_price" class="form-label">Selling Price *</label>
                        <div class="input-group">
                            <span class="input-group-text">Rs</span>
                            <input type="number" class="form-control" name="finished_good_price" step="0.01" id="finished_good_price" required>
                        </div>
                        <small class="text-muted">Used for production & sales</small>
                    </div>
                    <div class="col-md-4" id="unit_price_container">
                        <label for="unit_price" class="form-label">Selling Price *</label>
                        <div class="input-group">
                            <span class="input-group-text">Rs</span>
                            <input type="number" class="form-control" name="unit_price" step="0.01" required>
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                   <!-- <div class="col-md-4">
                        <label for="reorder_level" class="form-label">Reorder Level</label>
                        <input type="number" class="form-control" name="reorder_level" step="0.01" value="0">
                    </div>-->
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="warehouse_id" class="form-label">Warehouse</label>
                        <select name="warehouse_id" id="warehouse_id" class="form-control">
                            <option value="0">No Warehouse</option>
                            {% for wh in warehouses %}
                            <option value="{{ wh.id }}">{{ wh.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" name="description" rows="3" placeholder="Product details..."></textarea>
                </div>

                <div class="mb-3">
                    <label for="image" class="form-label">Product Image</label>
                    <input type="file" class="form-control" name="image" accept="image/*" id="imageInput">
                    <div class="form-text">Upload a product image (JPG, PNG, GIF). Optional.</div>
                    <div id="imagePreview" class="mt-2"></div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i> Save Product
                    </button>
                    <a href="{{ url_for('inventory.products') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('imageInput').addEventListener('change', function(e) {
    const preview = document.getElementById('imagePreview');
    if (e.target.files && e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.innerHTML = '<img src="' + e.target.result + '" style="max-width: 200px; max-height: 200px;">';
        };
        reader.readAsDataURL(e.target.files[0]);
    } else {
        preview.innerHTML = '';
    }
});

document.addEventListener('DOMContentLoaded', function() {
    const isManufacturedCheckbox = document.getElementById('is_manufactured');
    const costPriceContainer = document.getElementById('cost_price_container');
    const finishedGoodPriceContainer = document.getElementById('finished_good_price_container');
    const unitPriceContainer = document.getElementById('unit_price_container');
    const finishedGoodPriceInput = document.getElementById('finished_good_price');
    const unitPriceInput = document.querySelector('input[name="unit_price"]');

    function togglePriceFields() {
        if (isManufacturedCheckbox.checked) {
            costPriceContainer.style.display = 'none';
            finishedGoodPriceContainer.style.display = 'block';
            unitPriceContainer.style.display = 'none';
            unitPriceInput.removeAttribute('required');
            finishedGoodPriceInput.setAttribute('required', 'required');
        } else {
            costPriceContainer.style.display = 'block';
            finishedGoodPriceContainer.style.display = 'none';
            unitPriceContainer.style.display = 'block';
            finishedGoodPriceInput.removeAttribute('required');
            unitPriceInput.setAttribute('required', 'required');
        }
    }

    if (isManufacturedCheckbox) {
        isManufacturedCheckbox.addEventListener('change', togglePriceFields);
        togglePriceFields();
    }
});
</script>
{% endblock %}
