{% extends "base.html" %}

{% block title %}Add Payment{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">Add Payment</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Payment Number</label>
            <input name="payment_number" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control" value="{{ date_today }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Invoice</label>
            <select name="invoice_id" class="form-control">
                <option value="">None</option>
                {% for inv in invoices %}
                <option value="{{ inv.id }}">{{ inv.invoice_number }} ({{ inv.status }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Amount</label>
            <input type="number" step="0.01" name="amount" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Method</label>
            <select name="method" class="form-control">
                <option value="Cash">Cash</option>
                <option value="Bank">Bank</option>
                <option value="Card">Card</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Reference Number</label>
            <input type="text" name="reference_number" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control"></textarea>
        </div>
        <button class="btn btn-primary">Save Payment</button>
        <a class="btn btn-secondary" href="{{ url_for('accounting.payments') }}">Cancel</a>
    </form>
</div>
{% endblock %}
