{% extends "base.html" %}

{% block title %}Edit Payment Method{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4>Edit Payment Method</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {{ form.hidden_tag() }}
                        <div class="mb-3">
                            <label class="form-label">Payment Method Name</label>
                            {{ form.name(class="form-control") }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            {{ form.description(class="form-control", rows=3) }}
                        </div>
                        <button type="submit" class="btn btn-success">Update Payment Method</button>
                        <a href="{{ url_for('accounting.payment_methods') }}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
