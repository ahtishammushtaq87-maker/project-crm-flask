{% extends "base.html" %}

{% block title %}Edit Account{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">Edit Account</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Account Name</label>
            <input type="text" name="name" class="form-control" value="{{ account.name }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Code</label>
            <input type="text" name="code" class="form-control" value="{{ account.code }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Type</label>
            <select name="type" class="form-control" required>
                {% for t in ['Asset', 'Liability', 'Equity', 'Income', 'Expense'] %}
                <option value="{{ t }}" {% if account.type == t %}selected{% endif %}>{{ t }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Parent Account (optional)</label>
            <select name="parent_id" class="form-control">
                <option value="">None</option>
                {% for parent in parents %}
                <option value="{{ parent.id }}" {% if account.parent_id == parent.id %}selected{% endif %}>{{ parent.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control">{{ account.description }}</textarea>
        </div>
        <button class="btn btn-primary">Save</button>
        <a class="btn btn-secondary" href="{{ url_for('accounting.accounts') }}">Cancel</a>
    </form>
</div>
{% endblock %}
